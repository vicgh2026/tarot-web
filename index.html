            justify-content: center;
            align-items: center;

            margin-bottom: 30px;

            .card-name {
                font-size: 16px !important;
                margin-top: 5px !important;

        img {
            width: 250px;
            height: auto;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);

            margin-top: 10px;
            font-size: 18px;

        const yesNoProbabilityMap = {
            2: 0.8,
            1: 0.65,
            0: 0.5,
            [-1]: 0.35,
            [-2]: 0.2
        };

        const yesNoLabelMap = {
            2: "強烈偏是",
            1: "偏是",
            0: "中立",
            [-1]: "偏否",
            [-2]: "強烈偏否"
        };

        function getYesProbability(card) {
            const score = Number.isInteger(card.yesNoScore) ? card.yesNoScore : 0;
            return yesNoProbabilityMap[score] ?? 0.5;
        }

        function getYesNoMeta(card) {
            const yesProbability = getYesProbability(card);
            const isYes = Math.random() < yesProbability;
            const yesPercent = Math.round(yesProbability * 100);
            const noPercent = 100 - yesPercent;
            const score = Number.isInteger(card.yesNoScore) ? card.yesNoScore : 0;

            return {
                isYes,
                text: isYes ? "是" : "否",
                color: isYes ? "#4169E1" : "#8B0000",
                tendency: yesNoLabelMap[score] ?? "中立",
                yesPercent,
                noPercent
            };
        }

        function secureRandomInt(max) {
            if (!Number.isInteger(max) || max <= 0) {
                throw new Error("max 必須是大於 0 的整數");
            }

            const randomArray = new Uint32Array(1);
            const maxUint32 = 4294967296;
            const limit = Math.floor(maxUint32 / max) * max;

            while (true) {
                crypto.getRandomValues(randomArray);
                const value = randomArray[0];

                if (value < limit) {
                    return value % max;
                }
            }
        }

        function shuffleCards(cards) {
            const shuffled = [...cards];

            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = secureRandomInt(i + 1);
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }

            return shuffled;
        }

        function getRandomCards(num) {
            if (!Number.isInteger(num) || num <= 0) {
                throw new Error("抽牌張數必須是大於 0 的整數");
            }

            if (num > tarotCards.length) {
                throw new Error("抽牌張數不可超過牌組總數");
            }

            const shuffled = shuffleCards(tarotCards);
            return shuffled.slice(0, num);
        }

        function displayCards(cards, showYesNo = false) {
            const resultArea = document.getElementById("result-area");
            resultArea.innerHTML = "";

            cards.forEach(card => {
                const cardDiv = document.createElement("div");
                cardDiv.className = "card-container";

                let contentHTML = `<img src="THOTH-CARDS-78/${card.image}" alt="${card.name}">`;

                if (showYesNo) {
                    const yesNoMeta = getYesNoMeta(card);

                    contentHTML += `
                        <div class="card-name">
                            <span style="color: ${yesNoMeta.color}; font-weight: 600;">${yesNoMeta.text}</span>，${card.name}
                        </div>
                      
                    `;
                } else {
                    contentHTML += `<div class="card-name">${card.name}</div>`;
                }

                cardDiv.innerHTML = contentHTML;
                resultArea.appendChild(cardDiv);
            });
        }

        function drawOne() {
            displayCards(getRandomCards(1));
        }

        function drawYesNo() {
            displayCards(getRandomCards(1), true);
        }

        function drawThree() {
            displayCards(getRandomCards(3));
        }
