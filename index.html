<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>托特塔羅牌抽牌</title>
    <style>
        body {
            text-align: center;
            font-family: sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }
        
        button {
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            cursor: pointer;
        }
        
        #result-area {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
            margin-bottom: 30px;
            min-height: 400px;
            flex-direction: row;
        }

        @media (max-width: 768px) {
            #result-area {
                flex-direction: column;
                gap: 45px;
            }
            
            #button-area {
                display: flex;
                flex-direction: column;
                align-items: center; 
            }

            /* 這裡調大了手機版按鈕的數值 */
            button {
                font-size: 18px;       /* 字體加大 */
                padding: 12px 24px;    /* 增加內距，讓按鈕變厚 */
                margin: 10px;
                width: 200px;          /* 增加寬度 */
            }

            .card-name {
                font-size: 16px !important;
                margin-top: 5px !important;
            }
        }

        .card-container {
            text-align: center;
        }
        img {
            width: 250px;
            height: auto;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-shadow: 2px 2px 8px rgba(0,0,0,0.1);
        }
        .card-name {
            margin-top: 10px;
            font-size: 18px;
            font-weight: normal;
        }
    </style>
</head>
<body>

    <div id="result-area">
        <div class="card-container">
            <img src="THOTH-CARDS-78/card_back.jpg" alt="牌背">
        </div>
    </div>

    <div id="button-area">
        <button onclick="drawOne()">單張結果</button>
        <button onclick="drawYesNo()">是/否牌陣</button>
        <button onclick="drawThree()">三張牌陣</button>
    </div>

            { image: "74_DISKS_KNIGHT.jpg", name: "盤之騎士" },
            { image: "75_DISKS_QUEEN.jpg", name: "盤之皇后" },
            { image: "76_DISKS_PRINCE.jpg", name: "盤之王子" },
            { image: "77_DISKS_PRINCESS.jpg", name: "盤之公主" }
        ];

        function getRandomCards(num) {
            const shuffled = [...tarotCards].sort(() => 0.5 - Math.random());
            return shuffled.slice(0, num);
        }

        function displayCards(cards, showYesNo = false) {
            const resultArea = document.getElementById("result-area");
            resultArea.innerHTML = ""; 

            cards.forEach(card => {
                const cardDiv = document.createElement("div");
                cardDiv.className = "card-container";
                
                let contentHTML = `<img src="THOTH-CARDS-78/${card.image}" alt="${card.name}">`;
                
                if (showYesNo) {
                    const isYes = Math.random() >= 0.5;
                    const yesNoText = isYes ? "是" : "否";
                    const yesNoColor = isYes ? "#6495ED" : "#A52A2A";
                    
                    contentHTML += `
                        <div class="card-name">
                            <span style="color: ${yesNoColor};">${yesNoText}</span>，${card.name}
                        </div>
                    `;
                } else {
                    contentHTML += `<div class="card-name">${card.name}</div>`;
                }
                
                cardDiv.innerHTML = contentHTML;
                resultArea.appendChild(cardDiv);
            });
        }

        function drawOne() {
            displayCards(getRandomCards(1));
        }

        function drawYesNo() {
            displayCards(getRandomCards(1), true);
        }

        function drawThree() {
            displayCards(getRandomCards(3));
        }
    </script>
</body>
</html>
